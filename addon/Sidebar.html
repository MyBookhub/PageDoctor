<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --coral: #e8725a;
        --deep-coral: #c95a44;
        --warm-white: #faf8f6;
        --cream: #fff9f5;
        --black: #1a1a2e;
        --grey: #9e9eb0;
        --line: #ece6e1;
      }
      body {
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: var(--black);
        background: var(--warm-white);
        margin: 0;
        padding: 12px;
      }
      h1 {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 10px;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        border-radius: 999px;
        padding: 6px 14px;
        font-weight: 500;
        font-size: 12px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .primary {
        background: var(--coral);
        color: #fff;
      }
      .primary:hover:not(:disabled) {
        background: var(--deep-coral);
      }
      .ghost {
        background: transparent;
        color: var(--deep-coral);
        border: 1px solid var(--line);
      }
      .settings {
        background: var(--cream);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 10px;
      }
      .settings label {
        display: block;
        font-size: 11px;
        color: var(--grey);
        margin: 6px 0 2px;
      }
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 5px;
        background: #fff;
      }
      .checks {
        display: flex;
        gap: 12px;
        margin-top: 4px;
      }
      .checks label {
        display: flex;
        align-items: center;
        gap: 4px;
        color: var(--black);
        font-size: 12px;
        margin: 0;
      }
      .run {
        width: 100%;
        margin-top: 10px;
      }
      #status {
        color: var(--grey);
        font-size: 12px;
        margin: 8px 0;
        min-height: 16px;
      }
      .card {
        background: var(--cream);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 8px;
      }
      .badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        padding: 1px 8px;
        border-radius: 999px;
        color: #fff;
      }
      .FEHLER {
        background: var(--deep-coral);
      }
      .EMPFEHLUNG {
        background: var(--coral);
      }
      .HINWEIS {
        background: var(--grey);
      }
      .original {
        color: var(--grey);
        text-decoration: line-through;
        margin: 6px 0 2px;
      }
      .proposed {
        color: var(--black);
        font-weight: 500;
      }
      .reason {
        color: var(--grey);
        font-size: 12px;
        margin-top: 4px;
      }
      .actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>PageDoctor</h1>

    <div class="settings">
      <label for="book">Buchtyp</label>
      <select id="book">
        <option value="cookbook">Kochbuch</option>
        <option value="advice">Ratgeber</option>
        <option value="novel_memoir">Roman / Memoir</option>
        <option value="childrens">Kinderbuch</option>
      </select>

      <label for="strict">Strenge</label>
      <select id="strict">
        <option value="light">Leicht</option>
        <option value="standard" selected>Standard</option>
        <option value="thorough">Gründlich</option>
      </select>

      <label>Prüfmodi</label>
      <div class="checks">
        <label><input type="checkbox" id="m-proof" checked /> Korrektorat</label>
        <label><input type="checkbox" id="m-edit" checked /> Lektorat</label>
        <label><input type="checkbox" id="recipe" /> Rezeptmodus</label>
      </div>

      <label for="dict">Eigenes Wörterbuch (kommagetrennt)</label>
      <textarea id="dict" rows="2"></textarea>

      <button class="primary run" id="run" onclick="startReview()">Review starten</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center">
      <strong style="font-size: 13px">Sophies Anmerkungen</strong>
      <button class="ghost" onclick="load()">Aktualisieren</button>
    </div>
    <div id="status">Lädt…</div>
    <div id="list"></div>

    <script>
      function setStatus(message) {
        document.getElementById('status').textContent = message;
      }

      function onError(e) {
        document.getElementById('run').disabled = false;
        setStatus(e.message);
      }

      function collectConfig() {
        const modes = [];
        if (document.getElementById('m-proof').checked) modes.push('proofreading');
        if (document.getElementById('m-edit').checked) modes.push('editing');
        const dict = document
          .getElementById('dict')
          .value.split(/[,\n]/)
          .map(function (s) {
            return s.trim();
          })
          .filter(Boolean);
        return {
          modes: modes,
          book_type: document.getElementById('book').value,
          strictness: document.getElementById('strict').value,
          recipe_mode: document.getElementById('recipe').checked,
          custom_dictionary: dict,
        };
      }

      function startReview() {
        const config = collectConfig();
        if (!config.modes.length) {
          setStatus('Bitte mindestens einen Prüfmodus wählen.');
          return;
        }
        document.getElementById('run').disabled = true;
        setStatus('Review wird gestartet…');
        google.script.run
          .withFailureHandler(onError)
          .withSuccessHandler(function (started) {
            poll(started.run_id);
          })
          .startReview(config);
      }

      function poll(runId) {
        google.script.run
          .withFailureHandler(onError)
          .withSuccessHandler(function (p) {
            if (!p.done) {
              setStatus('Wird geprüft… (' + p.status + ')');
              window.setTimeout(function () {
                poll(runId);
              }, 2500);
              return;
            }
            document.getElementById('run').disabled = false;
            if (p.status === 'failed') {
              setStatus('Review fehlgeschlagen.');
            } else {
              load();
            }
          })
          .reviewStatus(runId);
      }

      function load() {
        setStatus('Lädt…');
        document.getElementById('list').innerHTML = '';
        google.script.run
          .withFailureHandler(onError)
          .withSuccessHandler(render)
          .getFindings();
      }

      function render(data) {
        const findings = (data && data.findings) || [];
        const list = document.getElementById('list');
        if (!findings.length) {
          setStatus('Keine offenen Anmerkungen.');
          return;
        }
        setStatus(findings.length + ' Anmerkung(en)');
        findings.forEach(function (finding) {
          list.appendChild(card(finding));
        });
      }

      function card(finding) {
        const el = document.createElement('div');
        el.className = 'card';
        el.innerHTML =
          '<span class="badge"></span>' +
          '<div class="original"></div>' +
          '<div class="proposed"></div>' +
          '<div class="reason"></div>' +
          '<div class="actions">' +
          '<button class="primary jump">Springen</button>' +
          '<button class="ghost apply">Übernehmen</button>' +
          '<button class="ghost dismiss">Verwerfen</button>' +
          '</div>';

        const badge = el.querySelector('.badge');
        badge.textContent = finding.priority;
        badge.classList.add(finding.priority);
        el.querySelector('.original').textContent = finding.quote;
        el.querySelector('.proposed').textContent = finding.proposed_change;
        el.querySelector('.reason').textContent = finding.reason_de;

        el.querySelector('.jump').onclick = function () {
          jump(finding);
        };
        el.querySelector('.apply').onclick = function () {
          apply(finding, el);
        };
        el.querySelector('.dismiss').onclick = function () {
          dismiss(finding, el);
        };
        return el;
      }

      function jump(finding) {
        google.script.run
          .withFailureHandler(onError)
          .withSuccessHandler(function (ok) {
            if (!ok) setStatus('Textstelle nicht gefunden: „' + finding.quote + '“');
          })
          .jumpToQuote(finding.quote);
      }

      function apply(finding, el) {
        google.script.run
          .withFailureHandler(onError)
          .withSuccessHandler(function (ok) {
            if (ok) el.remove();
            else setStatus('Textstelle nicht gefunden: „' + finding.quote + '“');
          })
          .applyFix(finding.quote, finding.proposed_change, finding.comment_id);
      }

      function dismiss(finding, el) {
        google.script.run
          .withFailureHandler(onError)
          .withSuccessHandler(function () {
            el.remove();
          })
          .dismissFinding(finding.comment_id);
      }

      load();
    </script>
  </body>
</html>
